name: Ejecutar Bot de Haxball

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  run-haxball:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código fuente
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar node-haxball
      run: npm install github:wxyz-abcd/node-haxball

    - name: Ejecutar Bot
      timeout-minutes: 2
      # Acá definimos las variables de entorno que leerá el bot
      env:
        ROOM_ID: "-Rh4xBAYzkQ"
        ROOM_PASSWORD: ${{ secrets.ROOM_PASSWORD }} # Usamos un Secret para la contraseña
        PLAYER_NAME: "Teleese-Bot"
        PLAYER_AVATAR: "🤖"
      run: node bots.js
